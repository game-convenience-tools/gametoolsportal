    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const lsGet = (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } };
        const lsSet = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };

        // フォールバック用デフォルト値（ba_master.json が読めない場合に使用）
        const DEFAULT_MASTER = {
            battleTypes: ['総力戦/大決戦', '制約解除決戦'],
            bosses: ['ビナー', 'ケセド', 'シロ＆クロ', 'ヒエロニムス', 'KAITEN FX Mk.0', 'ペロロジラ', 'ホド', 'ゴズ', 'グレゴリオ', 'ホバークラフト', 'クロカゲ', 'ゲブラ', 'イェソド'],
            limitBreakBosses: ['セトの憤怒', 'コクマー', 'ティファレト'],
            terrains: ['市街地', '屋外', '屋内'],
            armorTypes: [
                    { label: '軽装備(爆発)',   color: '#fecaca', textColor: '#b91c1c', darkColor: '#7f1d1d', darkTextColor: '#fca5a5' },
                    { label: '重装甲(貫通)',   color: '#fef08a', textColor: '#a16207', darkColor: '#713f12', darkTextColor: '#fde047' },
                    { label: '特殊装甲(神秘)', color: '#bfdbfe', textColor: '#1d4ed8', darkColor: '#1e3a5f', darkTextColor: '#93c5fd' },
                    { label: '弾力装甲(振動)', color: '#e9d5ff', textColor: '#7e22ce', darkColor: '#3b0764', darkTextColor: '#d8b4fe' },
                    { label: "軽装備(爆発)+特殊装甲(神秘)",   color: "#bfdbfe", textColor: "#b91c1c", darkColor: "#713f12", darkTextColor: "#fca5a5" }
                ],
            difficulties: ['LUNATIC', 'TORMENT', 'INSANE', 'EXTREME', 'HARDCORE'],
            characters: ['アコ','アル','アリス','アスナ','アズサ','アツコ','イオリ','イズナ','イズミ','イチカ','イロハ','ウイ','ウミカ','エイミ','エリカ','オトギ','カヨコ','カリン','カズサ','カスミ','キサキ','キララ','クルミ','ケイ','ここな','コタマ','コハル','コノカ','サオリ','サツキ','サヤ','シグレ','シズコ','シロコ','シロコ＊テラー','シュン','スズミ','セイア','セナ','セリナ','タカネ','トキ','ナギサ','ナグサ','ナツ','ニコ','ネル','ノドカ','ノノミ','ハナエ','ハナコ','ハルカ','ハルナ','ヒカリ','ヒナ','ヒナタ','ヒビキ','ヒフミ','ヒマリ','ヒヨリ','フウカ','フブキ','フユ','ホシノ','マキ','マコ','マシロ','マリナ','マリー','ミカ','ミサキ','ミドリ','ミネ','ミヤコ','ミヨ','ムツキ','メル','モモイ','ヤクモ','ユウカ','ユカリ','ユズ','ヨシミ','ラブ','リオ','リツ','リン','レイ','レイサ','レネ','ワカモ','アイリ','アカネ','アカリ','アコ(ドレス)','アコ(水着)','アスナ(バニーガール)','アツコ(水着)','アヤネ','アヤネ(正月)','アリス(メイド)','アリス(臨戦)','アル(ドレス)','アル(正月)','アズサ(水着)','イオリ(水着)','イズナ(水着)','イズミ(水着)','ウイ(水着)','ウタハ(応援団)','ウミカ(水着)','カスミ(水着)','カヨコ(正月)','カリン(バニーガール)','カズサ(バンド)','コタマ(キャンプ)','コハル(水着)','サオリ(水着)','サキ(水着)','シグレ(温泉)','シュン(幼女)','スズミ(マジカル)','セイア(水着)','セリナ(クリスマス)','チェリノ(温泉)','チナツ(温泉)','トキ(バニーガール)','トキ(臨戦)','ナギサ(水着)','ナツ(バンド)','ネル(バニーガール)','ノドカ(温泉)','ノノミ(水着)','ハスミ(体操服)','ハナエ(クリスマス)','ハナコ(水着)','ハルカ(ドレス)','ハルカ(正月)','ハルナ(体操服)','ハレ(キャンプ)','ヒナ(ドレス)','ヒナ(水着)','ヒナタ(水着)','ヒビキ(応援団)','ヒフミ(水着)','ヒマリ(臨戦)','フウカ(正月)','ホシノ(水着)','ホシノ(臨戦)','マキ(キャンプ)','マシロ(水着)','マリー(体操服)','ミカ(水着)','ミドリ(メイド)','ミヤコ(水着)','ミユ(水着)','ムツキ(ドレス)','ムツキ(正月)','モモイ(メイド)','ユウカ(体操服)','ユカリ(水着)','ユズ(メイド)','ユズ(臨戦)','ヨシミ(バンド)','レイ(水着)','レイサ(マジカル)','リオ(臨戦)','アカリ(正月)','アカネ(バニーガール)']
        };

        // ba_master.js が読み込まれていれば上書き、なければデフォルト値を使用
        const MASTER_DATA = (window.BA_MASTER)
            ? Object.assign({}, DEFAULT_MASTER, window.BA_MASTER)
            : DEFAULT_MASTER;

        function App() {
            const [master] = useState(MASTER_DATA);
            const [masterLoaded] = useState(true);

            const BATTLE_TYPE_OPTIONS = master.battleTypes;
            const BOSS_OPTIONS = master.bosses;
            const LIMIT_BREAK_BOSS_OPTIONS = master.limitBreakBosses;
            const TERRAIN_OPTIONS = master.terrains;
            const TYPE_OPTIONS = master.armorTypes;
            const DIFFICULTY_OPTIONS = master.difficulties;
            const BA_CHARACTERS = master.characters;
            const [theme, setTheme] = useState('arona');
            const [rawText, setRawText] = useState('');
            const [timelineItems, setTimelineItems] = useState([]);
            const [filterQuery, setFilterQuery] = useState('');
            const [activeRowIndex, setActiveRowIndex] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);
            const [isMaximized, setIsMaximized] = useState(false);
            const [maxRowsPerColumn, setMaxRowsPerColumn] = useState(15);
            const [customBreaks, setCustomBreaks] = useState(new Set());
            const [dragType, setDragType] = useState(null);
            const [draggedIdx, setDraggedIdx] = useState(null);
            const [dragOverIdx, setDragOverIdx] = useState(null);
            const [dragPos, setDragPos] = useState(null);
            
            const [metaTitle, setMetaTitle] = useState('');
            const [metaTitleManual, setMetaTitleManual] = useState(false);
            const [metaBattleType, setMetaBattleType] = useState('総力戦/大決戦');
            const [metaBoss, setMetaBoss] = useState('ビナー');
            const [metaTerrain, setMetaTerrain] = useState('市街地');
            const [metaType, setMetaType] = useState(() => MASTER_DATA.armorTypes[1]?.label || MASTER_DATA.armorTypes[0]?.label || '');
            const [metaDifficulty, setMetaDifficulty] = useState('LUNATIC');
            const [metaPhase, setMetaPhase] = useState('99'); 
            
            // 編成ステート（制約解除決戦の10枠に対応）- 配列で管理してD&D並び替えに対応
            const makeDefaultFormation = (battleType) => {
                const strikerCount = battleType === '制約解除決戦' ? 6 : 4;
                const specialCount = battleType === '制約解除決戦' ? 4 : 2;
                return [
                    ...[...Array(strikerCount)].map((_,i) => ({ slot: `striker${i+1}`, type: 'striker', name: '', startSkill: false, skillLevel: '' })),
                    ...[...Array(specialCount)].map((_,i) => ({ slot: `special${i+1}`, type: 'special', name: '', startSkill: false, skillLevel: '' })),
                ];
            };
            const [formationSlots, setFormationSlots] = useState(() => makeDefaultFormation('総力戦/大決戦'));
            const [fDragIdx, setFDragIdx] = useState(null);
            const [fDragOverIdx, setFDragOverIdx] = useState(null);
            const [acTarget, setAcTarget] = useState(null);
            const [acQuery, setAcQuery] = useState('');
            const [acPos, setAcPos] = useState({top:0, left:0, width:0});
            const [acHighlight, setAcHighlight] = useState(0);
            const acInputRefs = React.useRef({});
            const acListRef = React.useRef(null);
            const [cellColors, setCellColors] = useState({});
            const [colorPicker, setColorPicker] = useState(null);
            const [slTarget, setSlTarget] = useState(null);
            const [slPos, setSlPos] = useState({top:0, left:0});
            const [slHighlight, setSlHighlight] = useState(0);
            const SL_OPTIONS = ['', 's1','s2','s3','s4','s5','ex1','ex2','ex3','ex4']; // {key, x, y}

            const CELL_COLORS = [
                null,
                '#fef9c3','#fde68a','#fed7aa','#fecaca','#fbcfe8',
                '#ddd6fe','#bfdbfe','#bbf7d0','#d1fae5','#e0f2fe',
                '#f1f5f9',
            ];
            const CELL_COLOR_LABELS = ['なし','黄','橙黄','橙','赤','ピンク','紫','青','緑','薄緑','水','グレー'];

            const handleCellRightClick = (e, globalIndex, col) => {
                e.preventDefault();
                e.stopPropagation();
                const key = `${globalIndex}_${col}`;
                setColorPicker({ key, x: e.clientX, y: e.clientY });
            };

            const getContrastColor = (hex) => {
                if (!hex) return undefined;
                const r = parseInt(hex.slice(1,3),16);
                const g = parseInt(hex.slice(3,5),16);
                const b = parseInt(hex.slice(5,7),16);
                const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
                return luminance > 0.5 ? '#1e1b2e' : '#ffffff';
            };

            const cellStyle = (key) => {
                const bg = cellColors[key];
                if (!bg) return {};
                return { backgroundColor: bg, color: getContrastColor(bg) };
            };

            // 旧formation互換（保存/読込用）
            const formation = React.useMemo(() => {
                const obj = { startSkill: {}, skillLevels: {} };
                formationSlots.forEach(s => { obj[s.slot] = s.name; obj.startSkill[s.slot] = s.startSkill; obj.skillLevels[s.slot] = s.skillLevel || ''; });
                return obj;
            }, [formationSlots]);

            const slotsFromLegacy = (f, battleType) => {
                const def = makeDefaultFormation(battleType || '総力戦/大決戦');
                return def.map(s => ({ ...s, name: f[s.slot] || '', startSkill: f.startSkill ? (f.startSkill[s.slot] || false) : false, skillLevel: f.skillLevels ? (f.skillLevels[s.slot] || '') : '' }));
            };
            
            const [historyLogs, setHistoryLogs] = useState([]);
            const [historySearchQuery, setHistorySearchQuery] = useState('');
            const [historyFilterBoss, setHistoryFilterBoss] = useState('ALL');
            const [historyFilterDiff, setHistoryFilterDiff] = useState('ALL');
            const [historyFilterTerrain, setHistoryFilterTerrain] = useState('ALL');
            const [historyFilterType, setHistoryFilterType] = useState('ALL');
            const [showImportModal, setShowImportModal] = useState(false);
            const [importDragOver, setImportDragOver] = useState(false);

            useEffect(() => {
                const savedLogs = lsGet('ba_timeline_history');
                if (savedLogs) setHistoryLogs(JSON.parse(savedLogs));
            }, []);

            useEffect(() => {
                const root = window.document.documentElement;
                theme === 'plana' ? root.classList.add('dark') : root.classList.remove('dark');
            }, [theme]);

            useEffect(() => {
                if (metaTitleManual) return;
                const typeShort = metaType.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'');
                const diffOrPhase = metaBattleType === '制約解除決戦' ? `${metaPhase}段階` : metaDifficulty;
                setMetaTitle(`${metaBoss} ${diffOrPhase} ${metaTerrain} ${typeShort}`);
            }, [metaBoss, metaDifficulty, metaPhase, metaTerrain, metaType, metaBattleType]);

            useEffect(() => {
                const handler = (e) => {
                    if (e.target.closest('[data-ac-zone]')) return;
                    setAcTarget(null);
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            useEffect(() => {
                if (acListRef.current) {
                    const el = acListRef.current.querySelector(`#ac-item-${acHighlight}`);
                    if (el) el.scrollIntoView({ block: 'nearest' });
                }
            }, [acHighlight]);

            useEffect(() => {
                setFormationSlots(prev => {
                    const newDef = makeDefaultFormation(metaBattleType);
                    // 既存の値を新しい定義にマージ
                    return newDef.map(s => {
                        const existing = prev.find(p => p.slot === s.slot);
                        return existing ? { ...s, name: existing.name, startSkill: existing.startSkill, skillLevel: existing.skillLevel !== undefined ? existing.skillLevel : '' } : s;
                    });
                });
            }, [metaBattleType]);

            useEffect(() => {
                if (skipParseRef.current) { skipParseRef.current = false; return; }
                parseText(rawText);
            }, [rawText]);

            // 戦闘タイプが変更された際にボス選択を適切に切り替える
            useEffect(() => {
                if (metaBattleType === '制約解除決戦') {
                    if (!LIMIT_BREAK_BOSS_OPTIONS.includes(metaBoss)) setMetaBoss('セトの憤怒');
                } else {
                    if (!BOSS_OPTIONS.includes(metaBoss)) setMetaBoss('ビナー');
                }
            }, [metaBattleType]);

            const skipParseRef = useRef(false);

            const parseText = (text) => {
                if (!text.trim()) { setTimelineItems([]); return; }
                const lines = text.split('\n');
                const parsed = lines.map((line, index) => {
                    let parts = line.split(/[\t \u3000]+/);
                    if (parts.length < 2) parts = line.split(',');
                    // 3列目以降はタブ・スペース混在でも結合して行動欄とする
                    if (parts.length > 3) parts = [parts[0], parts[1], parts.slice(2).join(' ')];
                    const rawIndicator = parts[0]?.trim() || '';
                    const char = parts[1]?.trim() || '';
                    const memo = parts[2]?.trim() || '';
                    let type = 'unknown';
                    if (rawIndicator) {
                        if (rawIndicator.includes(':')) type = 'time';
                        else if (!isNaN(parseFloat(rawIndicator)) && isFinite(rawIndicator)) type = 'cost';
                        else type = 'text';
                    }
                    return { id: `row-${index}`, globalIndex: index, indicator: rawIndicator, type, character: char, memo };
                }).filter(item => item.indicator || item.character || item.memo);
                setTimelineItems(parsed);
            };

            const updateRawTextFromItems = (items) => {
                const text = items.map(item => `${item.indicator || ''}\t${item.character || ''}\t${item.memo || ''}`).join('\n');
                skipParseRef.current = true;
                setRawText(text);
            };

            const handleDragOverBase = (e, index, type) => {
                e.preventDefault();
                if (dragType !== type) return; 
                const rect = e.currentTarget.getBoundingClientRect();
                const relativeY = e.clientY - rect.top;
                const position = relativeY < rect.height / 2 ? 'top' : 'bottom';
                setDragOverIdx(index);
                setDragPos(position);
            };

            const getNewOrder = (list, fromIdx, toIdx, pos) => {
                const updated = [...list];
                const item = updated.splice(fromIdx, 1)[0];
                let target = toIdx;
                if (fromIdx < toIdx) { if (pos === 'top') target--; }
                else { if (pos === 'bottom') target++; }
                updated.splice(target, 0, item);
                return { updated, finalTarget: target };
            };

            const onTimelineDrop = (e, targetIndex) => {
                if (draggedIdx === null || dragType !== 'timeline') return;
                const { updated, finalTarget } = getNewOrder(timelineItems, draggedIdx, targetIndex, dragPos);
                const remapped = updated.map((item, idx) => ({ ...item, globalIndex: idx }));
                const newBreaks = new Set();
                customBreaks.forEach(bIdx => {
                    let actualIdx = bIdx;
                    if (bIdx === draggedIdx) actualIdx = finalTarget;
                    else {
                        if (bIdx > draggedIdx && bIdx <= finalTarget) actualIdx--;
                        if (bIdx < draggedIdx && bIdx >= finalTarget) actualIdx++;
                    }
                    newBreaks.add(actualIdx);
                });
                setCustomBreaks(newBreaks);
                setTimelineItems(remapped);
                updateRawTextFromItems(remapped);
                resetDrag();
            };

            const onHistoryDrop = (e, targetIndex) => {
                if (draggedIdx === null || dragType !== 'history') return;
                const currentFiltered = [...filteredHistoryLogs];
                const itemToMove = currentFiltered[draggedIdx];
                const realFromIdx = historyLogs.findIndex(l => l.id === itemToMove.id);
                let targetItem = currentFiltered[targetIndex];
                const realToIdx = historyLogs.findIndex(l => l.id === targetItem.id);
                const updated = [...historyLogs];
                const [removed] = updated.splice(realFromIdx, 1);
                updated.splice(realToIdx, 0, removed);
                setHistoryLogs(updated);
                lsSet('ba_timeline_history', JSON.stringify(updated));
                resetDrag();
            };

            const resetDrag = () => { 
                setDragType(null); setDraggedIdx(null); setDragOverIdx(null); setDragPos(null); 
            };

            // ===== タッチD&D =====
            const touchRef = useRef({});
            const ghostRef = useRef(null);
            const autoScrollTimer = useRef(null);
            const stopScroll = () => { if (autoScrollTimer.current) { clearInterval(autoScrollTimer.current); autoScrollTimer.current = null; } };

            const doScroll = (elOrId, speed) => {
                stopScroll();
                const el = (typeof elOrId === 'string') ? document.getElementById(elOrId) : elOrId;
                autoScrollTimer.current = setInterval(() => {
                    if (el) {
                        el.scrollTop = Math.max(0, Math.min(el.scrollHeight - el.clientHeight, el.scrollTop + speed));
                    } else {
                        window.scrollBy(0, speed);
                    }
                }, 16);
            };

            const showGhost = (text, x, y) => {
                let el = ghostRef.current;
                if (!el) { el = document.createElement('div'); el.className = 'touch-drag-ghost'; document.body.appendChild(el); ghostRef.current = el; }
                el.textContent = text;
                el.style.left = (x + 14) + 'px';
                el.style.top = (y - 20) + 'px';
            };
            const hideGhost = () => { if (ghostRef.current) { ghostRef.current.remove(); ghostRef.current = null; } };

            const checkEdgeScroll = (t, containerId) => {
                const el = containerId ? document.getElementById(containerId) : null;
                checkEdgeScrollEl(t, el);
            };

            const checkEdgeScrollEl = (t, el) => {
                if (el) {
                    const r = el.getBoundingClientRect();
                    const rel = t.clientY - r.top;
                    const EDGE = 60;
                    if (rel < EDGE) { doScroll(el, -Math.max(3, Math.round(18 * (1 - rel / EDGE)))); return; }
                    if (rel > r.height - EDGE) { doScroll(el, Math.max(3, Math.round(18 * (1 - (r.height - rel) / EDGE)))); return; }
                }
                stopScroll();
            };

            // タイムライン
            const findNearestScroll = (el) => {
                let cur = el;
                while (cur && cur !== document.body) {
                    const oy = window.getComputedStyle(cur).overflowY;
                    if (/(auto|scroll)/.test(oy) && cur.scrollHeight > cur.clientHeight + 2) return cur;
                    cur = cur.parentElement;
                }
                return document.getElementById('tl-scroll');
            };

            const tlTouchStart = (e, idx) => {
                e.stopPropagation();
                const t = e.touches[0];
                const container = findNearestScroll(e.currentTarget);
                touchRef.current = { kind: 'tl', idx, sx: t.clientX, sy: t.clientY, moved: false, container };
            };
            const tlTouchMove = (e) => {
                const d = touchRef.current; if (d.kind !== 'tl') return;
                const t = e.touches[0];
                if (!d.moved && Math.hypot(t.clientX - d.sx, t.clientY - d.sy) < 6) return;
                if (!d.moved) { d.moved = true; setDragType('timeline'); setDraggedIdx(d.idx); }
                showGhost(`${d.idx + 1}行目`, t.clientX, t.clientY);
                checkEdgeScrollEl(t, d.container);
                const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('tr[data-gidx]');
                if (el) { const g = +el.dataset.gidx; const r = el.getBoundingClientRect(); setDragOverIdx(g); setDragPos(t.clientY < r.top + r.height / 2 ? 'top' : 'bottom'); }
            };
            const tlTouchEnd = (e) => {
                const d = touchRef.current; stopScroll(); hideGhost();
                if (d.kind === 'tl' && d.moved) { const t = e.changedTouches[0]; const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('tr[data-gidx]'); if (el) onTimelineDrop(e, +el.dataset.gidx); else resetDrag(); }
                touchRef.current = {}; 
            };

            // 履歴
            const hiTouchStart = (e, idx) => { e.stopPropagation(); const t = e.touches[0]; touchRef.current = { kind: 'hi', idx, sx: t.clientX, sy: t.clientY, moved: false }; };
            const hiTouchMove = (e) => {
                const d = touchRef.current; if (d.kind !== 'hi') return;
                const t = e.touches[0];
                if (!d.moved && Math.hypot(t.clientX - d.sx, t.clientY - d.sy) < 6) return;
                if (!d.moved) { d.moved = true; setDragType('history'); setDraggedIdx(d.idx); }
                showGhost('履歴を移動', t.clientX, t.clientY);
                checkEdgeScroll(t, 'hi-scroll');
                const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('tr[data-hidx]');
                if (el) { const h = +el.dataset.hidx; const r = el.getBoundingClientRect(); setDragOverIdx(h); setDragPos(t.clientY < r.top + r.height / 2 ? 'top' : 'bottom'); }
            };
            const hiTouchEnd = (e) => {
                const d = touchRef.current; stopScroll(); hideGhost();
                if (d.kind === 'hi' && d.moved) { const t = e.changedTouches[0]; const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('tr[data-hidx]'); if (el) onHistoryDrop(e, +el.dataset.hidx); else resetDrag(); }
                touchRef.current = {};
            };

            // 編成
            const fmTouchStart = (e, idx) => { e.stopPropagation(); const t = e.touches[0]; touchRef.current = { kind: 'fm', idx, sx: t.clientX, sy: t.clientY, moved: false }; };
            const fmTouchMove = (e) => {
                const d = touchRef.current; if (d.kind !== 'fm') return;
                const t = e.touches[0];
                if (!d.moved && Math.hypot(t.clientX - d.sx, t.clientY - d.sy) < 6) return;
                if (!d.moved) { d.moved = true; setFDragIdx(d.idx); }
                showGhost('スロットを移動', t.clientX, t.clientY);
                stopScroll();
                const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('[data-fidx]');
                if (el) setFDragOverIdx(+el.dataset.fidx);
            };
            const fmTouchEnd = (e) => {
                const d = touchRef.current; stopScroll(); hideGhost();
                if (d.kind === 'fm' && d.moved) {
                    const t = e.changedTouches[0];
                    const el = document.elementFromPoint(t.clientX, t.clientY)?.closest('[data-fidx]');
                    if (el) {
                        const toIdx = +el.dataset.fidx; const fromIdx = d.idx;
                        if (fromIdx !== toIdx && formationSlots[fromIdx]?.type === formationSlots[toIdx]?.type) {
                            const upd = [...formationSlots];
                            const tmp = { name: upd[fromIdx].name, startSkill: upd[fromIdx].startSkill, skillLevel: upd[fromIdx].skillLevel };
                            upd[fromIdx] = { ...upd[fromIdx], name: upd[toIdx].name, startSkill: upd[toIdx].startSkill, skillLevel: upd[toIdx].skillLevel };
                            upd[toIdx] = { ...upd[toIdx], ...tmp };
                            setFormationSlots(upd);
                        }
                    }
                }
                setFDragIdx(null); setFDragOverIdx(null); touchRef.current = {};
            };

            // passive:false で touchmove のスクロール抑制
            useEffect(() => {
                const handler = (e) => {
                    const d = touchRef.current;
                    if (!d.kind || !d.moved) return;
                    e.preventDefault();
                };
                document.addEventListener('touchmove', handler, { passive: false, capture: true });
                return () => document.removeEventListener('touchmove', handler, { capture: true });
            }, []);

            const handleItemChange = (globalIdx, field, value) => {
                const updated = [...timelineItems];
                const targetItem = updated.find(item => item.globalIndex === globalIdx);
                if (!targetItem) return;
                targetItem[field] = value;
                if (field === 'indicator') {
                    if (value.includes(':')) targetItem.type = 'time';
                    else if (!isNaN(parseFloat(value)) && isFinite(value)) targetItem.type = 'cost';
                    else targetItem.type = 'text';
                }
                setTimelineItems(updated);
                updateRawTextFromItems(updated);
            };

            const handleAddRow = () => {
                const newItem = { id: Date.now(), globalIndex: timelineItems.length, indicator: '03:00', type: 'time', character: '', memo: '' };
                const updated = [...timelineItems, newItem];
                setTimelineItems(updated);
                updateRawTextFromItems(updated);
                setActiveRowIndex(updated.length - 1);
            };

            const handleDeleteRow = (idx) => {
                const updated = timelineItems.filter(item => item.globalIndex !== idx).map((item, nIdx) => ({...item, globalIndex: nIdx}));
                setTimelineItems(updated);
                updateRawTextFromItems(updated);
            };

            const handleSaveToHistory = () => {
                if (!metaTitle.trim()) { alert('タイトルを入力してください'); return; }
                const newLog = { 
                    id: Date.now(), 
                    title: metaTitle, 
                    battleType: metaBattleType,
                    boss: metaBoss, 
                    terrain: metaTerrain, 
                    type: metaType, 
                    difficulty: metaDifficulty, 
                    phase: metaPhase,
                    rawText: rawText, 
                    formation: formation,
                    cellColors: cellColors,
                    maxRowsPerColumn: maxRowsPerColumn,
                    customBreaks: [...customBreaks],
                    updatedAt: new Date().toLocaleString() 
                };
                const existingIdx = historyLogs.findIndex(l => l.title === metaTitle.trim());
                let updatedLogs;
                if (existingIdx >= 0) {
                    updatedLogs = [...historyLogs];
                    updatedLogs[existingIdx] = { ...newLog, id: historyLogs[existingIdx].id };
                    triggerAlert('同名の履歴を上書き保存しました');
                } else {
                    updatedLogs = [newLog, ...historyLogs];
                    triggerAlert('履歴に保存しました');
                }
                setHistoryLogs(updatedLogs);
                lsSet('ba_timeline_history', JSON.stringify(updatedLogs));
            };

            const handleLoadHistory = (log) => {
                if (window.confirm(`「${log.title}」を読み込みますか？`)) {
                    setRawText(log.rawText);
                    setMetaTitle(log.title || '');
                    setMetaTitleManual(!!(log.title));
                    setMetaBattleType(log.battleType || '総力戦/大決戦');
                    setMetaBoss(log.boss); 
                    setMetaTerrain(log.terrain || '市街地'); 
                    setMetaType(log.type || MASTER_DATA.armorTypes[1]?.label || '');
                    setMetaDifficulty(log.difficulty || 'LUNATIC');
                    setMetaPhase(log.phase || '74');
                    if (log.maxRowsPerColumn) setMaxRowsPerColumn(log.maxRowsPerColumn);
                    if (log.customBreaks) setCustomBreaks(new Set(log.customBreaks));
                    else setCustomBreaks(new Set());
                    setCellColors(log.cellColors || {});
                    if (log.formation) {
                        setFormationSlots(slotsFromLegacy(log.formation, log.battleType));
                    } else {
                        setFormationSlots(makeDefaultFormation(log.battleType || '総力戦/大決戦'));
                    }
                }
            };

            const triggerAlert = (msg) => { setAlertMsg(msg); setTimeout(() => setAlertMsg(null), 2500); };

            const handleExportRecord = (log) => {
                const data = JSON.stringify([log], null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const safeName = log.title.replace(/[\\/:*?"<>|]/g, '_');
                a.download = `ba_tl_${safeName}.json`;
                a.click();
                URL.revokeObjectURL(url);
                triggerAlert(`「${log.title}」をエクスポートしました`);
            };

            const processImportData = (jsonText) => {
                try {
                    const parsed = JSON.parse(jsonText);
                    const records = Array.isArray(parsed) ? parsed : [parsed];
                    if (records.length === 0 || typeof records[0] !== 'object') { alert('無効なデータ形式です'); return; }
                    const updated = [...historyLogs];
                    let addCount = 0, overwriteCount = 0;
                    records.forEach(incoming => {
                        const existingIdx = updated.findIndex(l => l.title === incoming.title);
                        if (existingIdx >= 0) {
                            updated[existingIdx] = { ...incoming, id: updated[existingIdx].id };
                            overwriteCount++;
                        } else {
                            updated.unshift({ ...incoming, id: incoming.id || Date.now() + Math.random() });
                            addCount++;
                        }
                    });
                    setHistoryLogs(updated);
                    lsSet('ba_timeline_history', JSON.stringify(updated));
                    setShowImportModal(false);
                    triggerAlert(`追加: ${addCount}件 / 上書き: ${overwriteCount}件`);
                } catch(e) {
                    alert('JSONの解析に失敗しました: ' + e.message);
                }
            };

            const handleImportFile = (file) => {
                if (!file || !file.name.endsWith('.json')) { alert('.jsonファイルを選択してください'); return; }
                const reader = new FileReader();
                reader.onload = (e) => processImportData(e.target.result);
                reader.readAsText(file);
            };

            const handleImport = () => {};

            const startSkillOrder = React.useMemo(() => {
                const map = {};
                const checked = formationSlots.filter(s => s.startSkill).sort((a, b) => a.startSkill - b.startSkill);
                checked.forEach((s, i) => { map[s.slot] = i + 1; });
                return map;
            }, [formationSlots]);

            const filteredItems = timelineItems.filter(item => {
                const q = filterQuery.toLowerCase();
                return item.character.toLowerCase().includes(q) || item.memo.toLowerCase().includes(q) || item.indicator.includes(q);
            });

            const filteredHistoryLogs = historyLogs.filter(log => {
                const searchMatch = log.title.toLowerCase().includes(historySearchQuery.toLowerCase()) || (log.boss && log.boss.includes(historySearchQuery));
                const bossMatch = historyFilterBoss === 'ALL' || log.boss === historyFilterBoss;
                const diffMatch = historyFilterDiff === 'ALL' || 
                                 (log.battleType !== '制約解除決戦' && log.difficulty === historyFilterDiff) || 
                                 (log.battleType === '制約解除決戦' && historyFilterDiff === '制約解除決戦');
                const terrainMatch = historyFilterTerrain === 'ALL' || log.terrain === historyFilterTerrain;
                const typeMatch = historyFilterType === 'ALL' || log.type === historyFilterType;
                return searchMatch && bossMatch && diffMatch && terrainMatch && typeMatch;
            });

            const renderTimelineTable = (itemsToRender, showBreak = false) => (
                <table className="w-full text-left border-collapse text-xs select-none">
                    <thead>
                        <tr className="bg-slate-50 dark:bg-slate-900/60 opacity-80 sticky top-0 z-10">
                            <th className="p-2 w-10 text-center"><i className="fa-solid fa-grip-lines opacity-60"></i></th>
                            <th className="p-2 w-24">TIME/COST</th>
                            <th className="p-2 w-28">生徒名</th>
                            <th className="p-2">行動</th>
                            {showBreak && <th className="p-2 w-8 text-center"><i className="fa-solid fa-scissors"></i></th>}
                            <th className="p-2 w-8 text-center">削</th>
                        </tr>
                    </thead>
                    <tbody>
                        {itemsToRender.map((item) => (
                            <tr key={item.id}
                                onDragOver={(e)=>handleDragOverBase(e, item.globalIndex, 'timeline')} 
                                onDrop={(e)=>onTimelineDrop(e, item.globalIndex)} 
                                onDragEnd={resetDrag}
                                onTouchMove={tlTouchMove}
                                onTouchEnd={tlTouchEnd}
                                data-gidx={item.globalIndex}
                                onClick={()=>setActiveRowIndex(item.globalIndex)}
                                className={`border-b border-slate-100 dark:border-purple-950/40 hover:bg-sky-50/60 dark:hover:bg-purple-950/20 cursor-pointer ${item.globalIndex % 2 === 0 ? 'bg-white dark:bg-slate-900/10' : 'bg-slate-50/70 dark:bg-slate-800/20'} ${activeRowIndex === item.globalIndex ? '!bg-sky-100/60 dark:!bg-purple-900/40' : ''} ${customBreaks.has(item.globalIndex) ? 'border-b-2 border-amber-400' : ''} ${dragType === 'timeline' && dragOverIdx === item.globalIndex && dragPos === 'top' ? 'drag-insert-top' : ''} ${dragType === 'timeline' && dragOverIdx === item.globalIndex && dragPos === 'bottom' ? 'drag-insert-bottom' : ''}`}>
                                <td draggable onDragStart={(e)=>{ e.stopPropagation(); setDragType('timeline'); setDraggedIdx(item.globalIndex); }} onTouchStart={(e)=>tlTouchStart(e,item.globalIndex)} className="p-1 text-center font-mono font-bold text-slate-400 cursor-move select-none">{item.globalIndex + 1}</td>
                                <td className="p-1" style={cellStyle(`${item.globalIndex}_0`)} onContextMenu={e=>handleCellRightClick(e,item.globalIndex,0)} onClick={e=>e.stopPropagation()}><div className="flex items-center gap-1"><span className="px-0.5 rounded text-[9px] font-bold bg-sky-100 text-sky-800">{item.type==='time'?'T':'C'}</span><input type="text" value={item.indicator} onChange={e=>handleItemChange(item.globalIndex,'indicator',e.target.value)} style={{color:'inherit'}} className="w-full bg-transparent font-bold font-mono outline-none" /></div></td>
                                <td className="p-1" style={cellStyle(`${item.globalIndex}_1`)} onContextMenu={e=>handleCellRightClick(e,item.globalIndex,1)} onClick={e=>e.stopPropagation()}><input type="text" value={item.character} onChange={e=>handleItemChange(item.globalIndex,'character',e.target.value)} style={{color:'inherit', fontSize: item.character.length >= 10 ? '9px' : item.character.length >= 7 ? '10px' : item.character.length >= 5 ? '11px' : '12px'}} className="w-full bg-transparent font-semibold outline-none" /></td>
                                <td className="p-1" style={cellStyle(`${item.globalIndex}_2`)} onContextMenu={e=>handleCellRightClick(e,item.globalIndex,2)} onClick={e=>e.stopPropagation()}><input type="text" value={item.memo} onChange={e=>handleItemChange(item.globalIndex,'memo',e.target.value)} style={{color:'inherit'}} className="w-full bg-transparent outline-none" /></td>
                                {showBreak && <td className="p-1 text-center"><button onClick={e=>{e.stopPropagation(); const n=new Set(customBreaks); n.has(item.globalIndex)?n.delete(item.globalIndex):n.add(item.globalIndex); setCustomBreaks(n);}} className={`p-1 ${customBreaks.has(item.globalIndex)?'text-amber-500':'text-slate-300'}`}><i className="fa-solid fa-scissors"></i></button></td>}
                                <td className="p-1 text-center"><button onClick={e=>{e.stopPropagation(); handleDeleteRow(item.globalIndex);}} className="text-rose-500"><i className="fa-solid fa-trash-can"></i></button></td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            );

            if (!masterLoaded) return (
                <div className="flex items-center justify-center min-h-screen text-slate-400 text-sm gap-2">
                    <i className="fa-solid fa-spinner fa-spin"></i> データを読み込んでいます...
                </div>
            );

            return (
                <div className={`container mx-auto px-4 mt-6 ${isMaximized ? 'max-w-full' : 'max-w-7xl'}`}>
                    {alertMsg && <div className="fixed top-5 right-5 z-50 bg-emerald-500 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2"><i className="fa-solid fa-circle-check"></i><span>{alertMsg}</span></div>}

                    {isMaximized && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex p-4 animate-fade-in">
                            <div className={`w-full h-full rounded-2xl border shadow-2xl flex flex-col p-5 overflow-hidden ${theme === 'arona' ? 'bg-white border-sky-100' : 'bg-[#1e1b2e] border-purple-900/50'}`}>
                                <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center border-b pb-3 mb-4 gap-4 shrink-0">
                                    <div><h2 className="font-bold text-lg flex items-center gap-2"><i className="fa-solid fa-expand text-indigo-500"></i><span>タイムライン大画面俯瞰モード</span></h2><p className="text-xs opacity-60">行や履歴は独立してドラッグ＆ドロップで入れ替え可能です。</p></div>
                                    <div className="flex items-center gap-2 bg-slate-100 dark:bg-slate-900/80 px-3 py-1.5 rounded-xl text-xs"><span className="font-semibold shrink-0">1列の行数: <strong className="text-sky-500">{maxRowsPerColumn}</strong></span><input type="range" min="5" max="50" value={maxRowsPerColumn} onChange={e=>setMaxRowsPerColumn(parseInt(e.target.value))} className="w-28 accent-sky-500 h-1" /></div>
                                    <div className="flex gap-2"><button onClick={handleAddRow} className="bg-sky-500 text-white text-xs px-3 py-2 rounded-xl">+ 行追加</button><button onClick={()=>setIsMaximized(false)} className="bg-rose-500 text-white text-xs px-4 py-2 rounded-xl">閉じる</button></div>
                                </div>
                                <div className="flex-grow overflow-x-auto overflow-y-hidden flex gap-4 p-2 items-start scrollbar-thin"
                                    style={{scrollbarWidth:'thin', scrollbarColor: theme==='arona' ? '#bae6fd #f0f9ff' : '#4c1d95 #1e1b2e'}}
                                >
                                    {(() => {
                                        const actualChunks = [];
                                        let cur = [];
                                        filteredItems.forEach(it => {
                                            cur.push(it);
                                            if(cur.length >= maxRowsPerColumn || customBreaks.has(it.globalIndex)) { actualChunks.push(cur); cur = []; }
                                        });
                                        if(cur.length > 0) actualChunks.push(cur);
                                        
                                        return actualChunks.map((chunk, cIdx) => (
                                            <div key={cIdx} id={`ov-scroll-${cIdx}`} className="w-[410px] shrink-0 rounded-xl border h-full overflow-y-auto bg-slate-50/30 dark:bg-slate-900/20">
                                                <div className="p-1.5 bg-slate-100 dark:bg-slate-900 text-[10px] font-bold opacity-75 text-center sticky top-0 z-20">エリア {cIdx+1}</div>
                                                {renderTimelineTable(chunk, true)}
                                            </div>
                                        ));
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}

                    <header className={`p-4 rounded-2xl mb-6 shadow-sm border ${theme==='arona'?'bg-white border-sky-100':'bg-[#1e1b2e] border-purple-900/50'}`}>
                        
                        {/* 1段目：タイトルとボタン群（ここだけに横並びの flex を適用します） */}
                        <div className="flex justify-between items-center w-full">
                            
                            {/* 左側：タイトル */}
                            <div className="flex items-center gap-3">
                                <div className="p-2 rounded-xl bg-sky-100 text-sky-600">
                                    <i className="fa-solid fa-history text-lg"></i>
                                </div>
                                <h1 className="text-lg font-bold">ブルアカタイムラインマネージャー</h1>
                            </div>
                            
                            {/* 右側：ボタン群 */}
                            <div className="flex items-center gap-2">
                                <button onClick={()=>setTheme(theme==='arona'?'plana':'arona')} className="px-3 py-1 rounded-xl text-xs border font-bold">
                                    {theme==='arona' ? 'アロナモード中' : 'プラナモード中'}
                                </button>
                                <button onClick={()=>{
                                    setMetaTitle('');
                                    setMetaTitleManual(false);
                                    setFormationSlots(makeDefaultFormation(metaBattleType));
                                    setRawText('');
                                    setCellColors({});
                                }} className="px-3 py-1 rounded-xl text-xs border font-bold text-rose-500 border-rose-200 hover:bg-rose-50 dark:border-rose-900 dark:hover:bg-rose-950/20 transition-colors">
                                    <i className="fa-solid fa-trash-can mr-1"></i>クリア
                                </button>
                                <button onClick={()=>window.open('操作マニュアル.html', '_blank')} className="px-3 py-1 rounded-xl text-xs border font-bold text-sky-500 border-sky-200 hover:bg-sky-50 dark:border-sky-900 dark:hover:bg-sky-950/20 transition-colors">
                                    <i className="fa-solid fa-circle-question mr-1"></i>ヘルプ
                                </button>
                            </div>
                    
                        </div>
    
                        {/* 2段目：独立した文字エリア（上のflexの影響を受けないため、必ず左端から始まります） */}
                        <div className="pt-3 mt-3 border-t border-slate-100 dark:border-purple-900/30 w-full">
                            <p className="text-xs text-slate-500 dark:text-purple-300 pl-1">
                                ※データはローカルストレージに保存しているので、意図せず消えることがあります。JSONでのバックアップを取得してください。
                            </p>
                        </div>

                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 mb-6">
                        <div className={`lg:col-span-5 p-4 rounded-2xl border flex flex-col justify-between ${theme==='arona'?'bg-white border-sky-100':'bg-[#1e1b2e] border-purple-900/50'}`}>
                            <h2 className="font-bold text-xs mb-2 flex items-center gap-1"><i className="fa-solid fa-layer-group text-sky-500"></i>属性・戦場設定</h2>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-2">
                                <div className="flex flex-col gap-1">
                                    <label className="text-[10px] opacity-60">戦闘タイプ</label>
                                    <select value={metaBattleType} onChange={e=>setMetaBattleType(e.target.value)} className="p-1.5 rounded border text-xs dark:bg-slate-900 dark:border-purple-950">
                                        {BATTLE_TYPE_OPTIONS.map(b=><option key={b} value={b}>{b}</option>)}
                                    </select>
                                </div>
                                <div className="flex flex-col gap-1">
                                    <label className="text-[10px] opacity-60">ボス</label>
                                    <select value={metaBoss} onChange={e=>setMetaBoss(e.target.value)} className="p-1.5 rounded border text-xs dark:bg-slate-900 dark:border-purple-950">
                                        {metaBattleType === '制約解除決戦' 
                                            ? LIMIT_BREAK_BOSS_OPTIONS.map(b=><option key={b}>{b}</option>)
                                            : BOSS_OPTIONS.map(b=><option key={b}>{b}</option>)}
                                    </select>
                                </div>
                                <div className="flex flex-col gap-1">
                                    <label className="text-[10px] opacity-60">{metaBattleType === '制約解除決戦' ? '段階' : '難易度'}</label>
                                    {metaBattleType === '制約解除決戦' ? (
                                        <div className="flex items-center gap-1">
                                            <input type="number" min="1" max="200" value={metaPhase} onChange={e=>setMetaPhase(e.target.value)} className="w-full p-1.5 rounded border text-xs dark:bg-slate-900 dark:border-purple-950 outline-none" />
                                            <span className="text-[10px] whitespace-nowrap">段階</span>
                                        </div>
                                    ) : (
                                        <select value={metaDifficulty} onChange={e=>setMetaDifficulty(e.target.value)} className="p-1.5 rounded border text-xs dark:bg-slate-900 dark:border-purple-950">
                                            {DIFFICULTY_OPTIONS.map(d=><option key={d}>{d}</option>)}
                                        </select>
                                    )}
                                </div>
                                <div className="flex flex-col gap-1">
                                    <label className="text-[10px] opacity-60">戦場 (地形)</label>
                                    <select value={metaTerrain} onChange={e=>setMetaTerrain(e.target.value)} className="p-1.5 rounded border text-xs dark:bg-slate-900 dark:border-purple-950">
                                        {TERRAIN_OPTIONS.map(t=><option key={t}>{t}</option>)}
                                    </select>
                                </div>
                                <div className="flex flex-col gap-1">
                                    <label className="text-[10px] opacity-60">ボス装甲タイプ</label>
                                    <select value={metaType} onChange={e=>setMetaType(e.target.value)} className="p-1.5 rounded border text-xs dark:bg-slate-900 dark:border-purple-950">
                                        {TYPE_OPTIONS.map(v=><option key={v.label} value={v.label}>{v.label}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="flex gap-1 mt-1">
                                <input type="text" placeholder="保存用のタイトルを入力..." value={metaTitle} onChange={e=>{ setMetaTitle(e.target.value); setMetaTitleManual(e.target.value !== ''); }} className="flex-grow p-1.5 text-xs rounded border dark:bg-slate-900 dark:border-purple-950 outline-none" />
                                <button onClick={handleSaveToHistory} className="bg-sky-500 hover:bg-sky-600 text-white text-xs px-4 rounded-xl font-bold transition-colors">保存</button>
                            </div>
                        </div>

                        <div className={`lg:col-span-7 p-4 rounded-2xl border flex flex-col ${theme==='arona'?'bg-white border-sky-100':'bg-[#1e1b2e] border-purple-900/50'}`}>
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-2">
                                <h2 className="font-bold text-xs flex items-center gap-2"><i className="fa-solid fa-arrows-up-down opacity-50"></i>履歴リスト (ドラッグで並べ替え)</h2>
                                <div className="flex flex-wrap items-center gap-1 w-full sm:w-auto">
                                    <button onClick={()=>{const data=JSON.stringify(historyLogs,null,2);const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`ba_timeline_all_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.json`;a.click();URL.revokeObjectURL(url);triggerAlert('全履歴をエクスポートしました');}} className="bg-emerald-500 hover:bg-emerald-600 text-white text-[11px] px-2 py-1 rounded-lg font-bold transition-colors"><i className="fa-solid fa-file-export mr-1"></i>全エクスポート</button>
                                    <button onClick={()=>setShowImportModal(true)} className="bg-indigo-500 hover:bg-indigo-600 text-white text-[11px] px-2 py-1 rounded-lg font-bold transition-colors"><i className="fa-solid fa-file-import mr-1"></i>インポート</button>
                                    <input type="text" placeholder="履歴検索..." value={historySearchQuery} onChange={e=>setHistorySearchQuery(e.target.value)} className="p-1 px-2 rounded border text-[11px] dark:bg-slate-900 dark:border-purple-950 outline-none w-24" />
                                    <select value={historyFilterBoss} onChange={e=>setHistoryFilterBoss(e.target.value)} className="p-1 rounded border text-[11px] dark:bg-slate-900 dark:border-purple-950">
                                        <option value="ALL">全てのボス</option>
                                        <optgroup label="総力戦/大決戦">
                                            {BOSS_OPTIONS.map(b=><option key={b} value={b}>{b}</option>)}
                                        </optgroup>
                                        <optgroup label="制約解除決戦">
                                            {LIMIT_BREAK_BOSS_OPTIONS.map(b=><option key={`lb_${b}`} value={b}>{b}</option>)}
                                        </optgroup>
                                    </select>
                                    <select value={historyFilterDiff} onChange={e=>setHistoryFilterDiff(e.target.value)} className="p-1 rounded border text-[11px] dark:bg-slate-900 dark:border-purple-950">
                                        <option value="ALL">全難易度・段階</option>
                                        <option value="制約解除決戦">制約解除（全段階）</option>
                                        {DIFFICULTY_OPTIONS.map(d=><option key={d} value={d}>{d}</option>)}
                                    </select>
                                    <select value={historyFilterTerrain} onChange={e=>setHistoryFilterTerrain(e.target.value)} className="p-1 rounded border text-[11px] dark:bg-slate-900 dark:border-purple-950"><option value="ALL">全地形</option>{TERRAIN_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}</select>
                                    <select value={historyFilterType} onChange={e=>setHistoryFilterType(e.target.value)} className="p-1 rounded border text-[11px] dark:bg-slate-900 dark:border-purple-950"><option value="ALL">全装甲</option>{TYPE_OPTIONS.map(t=><option key={t.label} value={t.label}>{t.label}</option>)}</select>
                                </div>
                            </div>
                            <div id="hi-scroll" className="overflow-y-auto h-[120px] border dark:border-purple-950/60 rounded-xl text-[11px] bg-slate-50/50 dark:bg-slate-900/20" style={{scrollbarWidth:'thin', scrollbarColor: theme==='arona' ? '#bae6fd #f0f9ff' : '#4c1d95 #1e1b2e'}}>
                                <table className="w-full text-left border-collapse">
                                    <tbody>
                                        {filteredHistoryLogs.length === 0 ? (
                                            <tr><td className="p-4 text-center opacity-40">該当する履歴が見つかりません</td></tr>
                                        ) : (
                                            filteredHistoryLogs.map((log, idx) => (
                                                <tr key={log.id}
                                                    onDragOver={(e)=>handleDragOverBase(e, idx, 'history')} 
                                                    onDrop={(e)=>onHistoryDrop(e, idx)} 
                                                    onDragEnd={resetDrag}
                                                    onTouchMove={hiTouchMove}
                                                    onTouchEnd={hiTouchEnd}
                                                    data-hidx={idx}
                                                    className={`border-b border-slate-100 dark:border-purple-950/40 hover:bg-slate-100/60 dark:hover:bg-purple-950/30 cursor-pointer ${dragType === 'history' && dragOverIdx === idx && dragPos === 'top' ? 'drag-insert-top' : ''} ${dragType === 'history' && dragOverIdx === idx && dragPos === 'bottom' ? 'drag-insert-bottom' : ''}`}>
                                                    <td draggable onDragStart={()=>{ setDragType('history'); setDraggedIdx(idx); }} onTouchStart={(e)=>hiTouchStart(e,idx)} className="p-2 w-6 text-center text-slate-400 cursor-grab active:cursor-grabbing select-none history-drag-handle"><i className="fa-solid fa-grip-vertical"></i></td>
                                                    <td className="p-2 font-bold text-sky-600 dark:text-purple-300" onClick={()=>handleLoadHistory(log)}>{log.title}</td>
                                                    <td className="p-2 opacity-70" onClick={()=>handleLoadHistory(log)}>
                                                        <span className="inline-block px-1 rounded bg-slate-200 dark:bg-purple-950 text-[10px] mr-1">{log.boss}</span>
                                                        <span className={`inline-block px-1 rounded text-[10px] mr-1 ${log.battleType === '制約解除決戦' ? 'bg-indigo-100 text-indigo-800 dark:bg-indigo-950/40 dark:text-indigo-300' : 'bg-amber-100 text-amber-800 dark:bg-amber-950/40 dark:text-amber-300'}`}>
                                                            {log.battleType === '制約解除決戦' ? `${log.phase || '??'}段階` : log.difficulty}
                                                        </span>
                                                        {log.terrain && <span className="text-[10px] opacity-60 mr-1">({log.terrain})</span>}
                                                        {log.type && (() => {
                                                            const label = log.type.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'');
                                                            const armorDef = TYPE_OPTIONS.find(t => t.label === log.type);
                                                            const isDark = theme === 'plana';
                                                            const bg = armorDef ? (isDark ? armorDef.darkColor : armorDef.color) : '#e2e8f0';
                                                            const tc = armorDef ? (isDark ? armorDef.darkTextColor : armorDef.textColor) : '#475569';
                                                            return <span className="inline-block px-1 rounded text-[10px]" style={{backgroundColor: bg, color: tc}}>{label}</span>;
                                                        })()}
                                                    </td>
                                                    <td className="p-2 text-right whitespace-nowrap">
                                                        <button onClick={(e)=>{e.stopPropagation(); handleExportRecord(log);}} className="text-emerald-500 hover:text-emerald-700 px-2" title="エクスポート"><i className="fa-solid fa-file-export"></i></button>
                                                        <button onClick={(e)=>{e.stopPropagation(); if(confirm('この履歴を削除しますか？')) { const updated = historyLogs.filter(l=>l.id!==log.id); setHistoryLogs(updated); lsSet('ba_timeline_history', JSON.stringify(updated)); }}} className="text-rose-400 hover:text-rose-600 px-2" title="削除"><i className="fa-solid fa-trash"></i></button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* 編成エリア */}
                    <div className={`p-4 rounded-2xl border flex flex-col mb-6 shadow-sm ${theme==='arona'?'bg-white border-sky-100':'bg-[#1e1b2e] border-purple-900/50'}`}>
                        <h2 className="font-bold text-xs mb-3 flex items-center gap-2"><i className="fa-solid fa-users text-sky-500"></i>編成設定 <span className="font-normal opacity-50">ドラッグで順番を入れ替え</span></h2>
                        <div className="flex gap-2 w-full">
                            {formationSlots.map((slot, idx) => {
                                const isStriker = slot.type === 'striker';
                                const num = parseInt(slot.slot.replace(/\D/g,''));
                                const isDragging = fDragIdx === idx;
                                const isDragOver = fDragOverIdx === idx;
                                return (
                                    <div
                                        key={slot.slot}
                                        onDragOver={e => { e.preventDefault(); setFDragOverIdx(idx); }}
                                        onDragLeave={() => setFDragOverIdx(null)}
                                        onDrop={e => {
                                            e.preventDefault();
                                            if (fDragIdx === null || fDragIdx === idx) { setFDragIdx(null); setFDragOverIdx(null); return; }
                                            const draggedSlot = formationSlots[fDragIdx];
                                            if (draggedSlot.type !== slot.type) { setFDragIdx(null); setFDragOverIdx(null); return; }
                                            const updated = [...formationSlots];
                                            const tmp = { name: updated[fDragIdx].name, startSkill: updated[fDragIdx].startSkill, skillLevel: updated[fDragIdx].skillLevel };
                                            updated[fDragIdx] = { ...updated[fDragIdx], name: updated[idx].name, startSkill: updated[idx].startSkill, skillLevel: updated[idx].skillLevel };
                                            updated[idx] = { ...updated[idx], name: tmp.name, startSkill: tmp.startSkill, skillLevel: tmp.skillLevel };
                                            setFormationSlots(updated);
                                            setFDragIdx(null); setFDragOverIdx(null);
                                        }}
                                        onTouchMove={fmTouchMove}
                                        onTouchEnd={fmTouchEnd}
                                        data-fidx={idx}
                                        className={`flex flex-col gap-1 flex-1 min-w-0 rounded-xl p-1.5 border-2 transition-all relative
                                            ${isDragging ? 'opacity-40 scale-95' : 'opacity-100'}
                                            ${isDragOver && !isDragging && (fDragIdx === null || formationSlots[fDragIdx]?.type === slot.type) ? (isStriker ? 'border-rose-400 bg-rose-50 dark:bg-rose-950/20' : 'border-indigo-400 bg-indigo-50 dark:bg-indigo-950/20') : 'border-transparent'}
                                        `}
                                    >
                                        <div
                                            draggable
                                            onDragStart={() => setFDragIdx(idx)}
                                            onDragEnd={() => { setFDragIdx(null); setFDragOverIdx(null); }}
                                            onTouchStart={(e) => fmTouchStart(e, idx)}
                                            className={`flex items-center justify-between px-1 rounded text-[10px] font-bold cursor-grab active:cursor-grabbing select-none ${isStriker ? 'text-rose-500 bg-rose-50 dark:bg-rose-950/30' : 'text-indigo-500 bg-indigo-50 dark:bg-indigo-950/30'}`}>
                                            <span>{isStriker ? `ST${num}` : `SP${num}`}{startSkillOrder[slot.slot] ? <span className="ml-1 inline-flex items-center justify-center w-3.5 h-3.5 rounded-full bg-amber-400 text-white text-[9px] font-black">{startSkillOrder[slot.slot]}</span> : null}</span>
                                            <i className="fa-solid fa-grip-dots-vertical opacity-40 text-[9px]"></i>
                                        </div>
                                        <div className="flex gap-1 items-center">
                                        <input
                                            type="text"
                                            placeholder="生徒名"
                                            value={slot.name}
                                            data-ac-zone="true"
                                            autoComplete="off"
                                            ref={el => acInputRefs.current[idx] = el}
                                            onChange={e => {
                                                const updated = [...formationSlots];
                                                updated[idx] = { ...updated[idx], name: e.target.value };
                                                setFormationSlots(updated);
                                                setAcQuery(e.target.value);
                                                setAcTarget(idx);
                                                setAcHighlight(0);
                                                const el = acInputRefs.current[idx];
                                                if (el) { const r = el.getBoundingClientRect(); setAcPos({top: r.bottom + 4, left: r.left, width: Math.max(r.width, 140)}); }
                                            }}
                                            onFocus={e => {
                                                setAcTarget(idx);
                                                setAcQuery(slot.name);
                                                setAcHighlight(0);
                                                const r = e.target.getBoundingClientRect();
                                                setAcPos({top: r.bottom + 4, left: r.left, width: Math.max(r.width, 140)});
                                            }}
                                            onKeyDown={e => {
                                                if (e.key === 'Tab') {
                                                    setAcTarget(null);
                                                    return;
                                                }
                                                const q = acQuery.trim();
                                                const suggestions = BA_CHARACTERS.filter(c => q === '' ? true : c.includes(q));
                                                if (!suggestions.length) return;
                                                if (e.key === 'ArrowDown') {
                                                    e.preventDefault();
                                                    setAcHighlight(h => Math.min(h + 1, suggestions.length - 1));
                                                } else if (e.key === 'ArrowUp') {
                                                    e.preventDefault();
                                                    setAcHighlight(h => Math.max(h - 1, 0));
                                                } else if (e.key === 'Enter') {
                                                    e.preventDefault();
                                                    const selected = suggestions[acHighlight];
                                                    if (selected) {
                                                        const updated = [...formationSlots];
                                                        updated[idx] = { ...updated[idx], name: selected };
                                                        setFormationSlots(updated);
                                                        setAcTarget(null);
                                                    }
                                                } else if (e.key === 'Escape') {
                                                    setAcTarget(null);
                                                }
                                            }}
                                            className={`p-1.5 rounded border dark:bg-slate-900 text-center outline-none focus:border-sky-400 cursor-text min-w-0 flex-1
                                                ${isStriker ? 'dark:border-rose-950/50 border-rose-100' : 'dark:border-indigo-950/50 border-indigo-100'}`}
                                            style={{fontSize: slot.name.length >= 10 ? '9px' : slot.name.length >= 7 ? '10px' : slot.name.length >= 5 ? '11px' : '12px'}}
                                        />
                                        <button
                                            onClick={e => {
                                                e.stopPropagation();
                                                const r = e.currentTarget.getBoundingClientRect();
                                                setSlPos({top: r.bottom + 4, left: r.left});
                                                const hi = SL_OPTIONS.indexOf(slot.skillLevel || '');
                                                setSlHighlight(hi >= 0 ? hi : 0);
                                                setSlTarget(prev => prev===slot.slot ? null : slot.slot);
                                            }}
                                            onKeyDown={e => {
                                                if (!['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter',' ','Escape'].includes(e.key)) return;
                                                e.preventDefault();
                                                if (slTarget !== slot.slot) {
                                                    if (e.key === 'Enter' || e.key === ' ') {
                                                        const r = e.currentTarget.getBoundingClientRect();
                                                        setSlPos({top: r.bottom + 4, left: r.left});
                                                        const hi = SL_OPTIONS.indexOf(slot.skillLevel || '');
                                                        setSlHighlight(hi >= 0 ? hi : 0);
                                                        setSlTarget(slot.slot);
                                                    }
                                                    return;
                                                }
                                                if (e.key === 'Escape') { setSlTarget(null); return; }
                                                if (e.key === 'Enter' || e.key === ' ') {
                                                    const selected = SL_OPTIONS[slHighlight];
                                                    const updated = [...formationSlots];
                                                    updated[idx] = { ...updated[idx], skillLevel: selected };
                                                    setFormationSlots(updated);
                                                    setSlTarget(null);
                                                    return;
                                                }
                                                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') setSlHighlight(h => Math.min(h + 1, SL_OPTIONS.length - 1));
                                                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') setSlHighlight(h => Math.max(h - 1, 0));
                                            }}
                                            onBlur={() => setTimeout(() => setSlTarget(null), 150)}
                                            className={`shrink-0 rounded border px-0.5 py-1 dark:bg-slate-900 cursor-pointer flex items-center justify-center focus:outline-none focus:ring-1 focus:ring-sky-400 ${isStriker ? 'border-rose-100 dark:border-rose-950/50' : 'border-indigo-100 dark:border-indigo-950/50'}`}
                                        >
                                            {(() => {
                                                const lv = slot.skillLevel || '';
                                                if (!lv) return <span className="text-[11px] font-bold opacity-30 w-5 h-5 flex items-center justify-center">－</span>;
                                                const isEx = lv.startsWith('ex');
                                                const num = isEx ? lv.slice(2) : lv.slice(1);
                                                return (
                                                    <span className="relative inline-flex w-5 h-5 items-center justify-center leading-none select-none" style={{fontSize:'18px', color: isEx ? '#38bdf8' : '#fbbf24'}}>
                                                        ★
                                                        <span className="absolute inset-0 flex items-center justify-center font-black" style={{fontSize:'9px', color:'white', textShadow: isEx ? '0 0 3px #0369a1, 0 0 3px #0369a1' : '0 0 3px #92400e, 0 0 3px #92400e', marginTop:'1px'}}>{num}</span>
                                                    </span>
                                                );
                                            })()}
                                        </button>
                                        {slTarget === slot.slot && ReactDOM.createPortal(
                                            <div
                                                style={{position:'fixed', top: slPos.top, left: slPos.left, zIndex: 9999, minWidth: 72}}
                                                className={`rounded-xl border shadow-2xl overflow-hidden ${theme==='arona'?'bg-white border-sky-200':'bg-[#1e1b2e] border-purple-700'}`}
                                                onMouseLeave={() => setSlTarget(null)}
                                            >
                                                <div className="flex px-2 pt-2 pb-1 gap-1.5 border-b dark:border-purple-900">
                                                    <span
                                                        onMouseDown={e => { e.preventDefault(); const updated=[...formationSlots]; updated[idx]={...updated[idx],skillLevel:''}; setFormationSlots(updated); setSlTarget(null); }}
                                                        onMouseEnter={() => setSlHighlight(0)}
                                                        className={`relative inline-flex w-7 h-7 items-center justify-center leading-none cursor-pointer transition-transform rounded border text-[10px] font-bold ${slHighlight===0 ? 'scale-125 border-sky-400 opacity-100' : 'opacity-50 border-slate-200 dark:border-slate-700'}`}
                                                    >－</span>
                                                </div>
                                                <div className="flex px-2 pt-1.5 pb-1 gap-1.5">
                                                    {[1,2,3,4,5].map((n,ni) => (
                                                        <span key={`s${n}`}
                                                            onMouseDown={e => { e.preventDefault(); const updated=[...formationSlots]; updated[idx]={...updated[idx],skillLevel:`s${n}`}; setFormationSlots(updated); setSlTarget(null); }}
                                                            onMouseEnter={() => setSlHighlight(ni+1)}
                                                            className={`relative inline-flex w-7 h-7 items-center justify-center leading-none cursor-pointer transition-transform ${slHighlight===ni+1 ? 'scale-125' : (slot.skillLevel||'')===`s${n}` ? 'scale-110' : 'hover:scale-110'}`}
                                                            style={{fontSize:'22px', color:'#fbbf24', filter: slHighlight===ni+1 ? 'drop-shadow(0 0 3px #fbbf24)' : 'none'}}
                                                        >★<span className="absolute inset-0 flex items-center justify-center font-black" style={{fontSize:'10px', color:'white', textShadow:'0 0 3px #92400e, 0 0 3px #92400e', marginTop:'2px'}}>{n}</span></span>
                                                    ))}
                                                </div>
                                                <div className="flex px-2 pt-1 pb-2 gap-1.5">
                                                    {[1,2,3,4].map((n,ni) => (
                                                        <span key={`ex${n}`}
                                                            onMouseDown={e => { e.preventDefault(); const updated=[...formationSlots]; updated[idx]={...updated[idx],skillLevel:`ex${n}`}; setFormationSlots(updated); setSlTarget(null); }}
                                                            onMouseEnter={() => setSlHighlight(ni+6)}
                                                            className={`relative inline-flex w-7 h-7 items-center justify-center leading-none cursor-pointer transition-transform ${slHighlight===ni+6 ? 'scale-125' : (slot.skillLevel||'')===`ex${n}` ? 'scale-110' : 'hover:scale-110'}`}
                                                            style={{fontSize:'22px', color:'#38bdf8', filter: slHighlight===ni+6 ? 'drop-shadow(0 0 3px #38bdf8)' : 'none'}}
                                                        >★<span className="absolute inset-0 flex items-center justify-center font-black" style={{fontSize:'10px', color:'white', textShadow:'0 0 3px #0369a1, 0 0 3px #0369a1', marginTop:'2px'}}>{n}</span></span>
                                                    ))}
                                                </div>
                                            </div>,
                                            document.body
                                        )}
                                        </div>
                                        <div className="flex flex-col items-center gap-1">
                                        <label className="flex items-center justify-center gap-1 cursor-pointer select-none">
                                            <input
                                                type="checkbox"
                                                checked={!!slot.startSkill}
                                                onChange={e => {
                                                    const updated = [...formationSlots];
                                                    updated[idx] = { ...updated[idx], startSkill: e.target.checked ? Date.now() : false };
                                                    setFormationSlots(updated);
                                                }}
                                                className={`w-3 h-3 ${isStriker ? 'accent-rose-500' : 'accent-indigo-500'}`}
                                            />
                                            <span className={`text-[10px] font-bold ${isStriker ? 'text-rose-500' : 'text-indigo-500'}`}>開始スキル</span>
                                        </label>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-5 flex flex-col gap-2">
                            <div className="flex items-center gap-2">
                                <h2 className="font-bold text-xs flex items-center gap-1"><i className="fa-solid fa-paste text-sky-500"></i>一括貼り付けエリア</h2>
                            </div>
                            <textarea value={rawText} onChange={e=>setRawText(e.target.value)} style={{scrollbarWidth:'thin', scrollbarColor: theme==='arona' ? '#bae6fd #f0f9ff' : '#4c1d95 #1e1b2e'}} className="w-full flex-grow h-[420px] p-2 rounded-xl border dark:border-purple-950 text-xs font-mono dark:bg-slate-900 resize-none outline-none focus:border-sky-400 dark:focus:border-purple-500" placeholder={"タブ区切り・全角/半角スペース区切りでここに貼り付け\n例：\n03:52\tヒマリ\t→ミカバフ\n9.9\tアコ\t→ミカバフ\n03:47 ミカ EX発動（1回目）\n※行動欄（3列目）にスペースを含む場合はタブ区切り推奨"} />
                        </div>
                        <div className="lg:col-span-7 flex flex-col gap-2">
                            <div className="flex justify-between items-center">
                                <input type="text" placeholder="タイムライン内検索..." value={filterQuery} onChange={e=>setFilterQuery(e.target.value)} className="p-1.5 rounded-xl text-xs border dark:border-purple-950 dark:bg-slate-900 w-44 outline-none" />
                                <div className="flex gap-2">
                                    <button onClick={()=>setIsMaximized(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-3 py-1.5 rounded-xl shadow-sm transition-colors"><i className="fa-solid fa-expand"></i> 大画面モード</button>
                                    <button onClick={handleAddRow} className="bg-sky-500 hover:bg-sky-600 text-white font-bold text-xs px-3 py-1.5 rounded-xl shadow-sm transition-colors">+ 行追加</button>
                                </div>
                            </div>
