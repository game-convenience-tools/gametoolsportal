                            <div className={`p-4 rounded-2xl border shadow-sm h-[420px] overflow-hidden flex flex-col ${theme==='arona'?'bg-white border-sky-100':'bg-[#1e1b2e] border-purple-900/50'}`}>
                                <div id="tl-scroll" className="overflow-y-auto flex-grow" style={{scrollbarWidth:'thin', scrollbarColor: theme==='arona' ? '#bae6fd #f0f9ff' : '#4c1d95 #1e1b2e'}}>{renderTimelineTable(filteredItems)}</div>
                            </div>
                        </div>
                    </div>
                    {/* セル背景色ピッカー (portal) */}
                    {colorPicker && ReactDOM.createPortal(
                        <div
                            style={{position:'fixed', top: colorPicker.y, left: colorPicker.x, zIndex: 9998}}
                            className={`rounded-xl border shadow-2xl p-2 flex flex-col gap-1.5 ${theme==='arona'?'bg-white border-sky-200':'bg-[#1e1b2e] border-purple-700'}`}
                            onMouseLeave={()=>setColorPicker(null)}
                        >
                            <p className="text-[10px] font-bold opacity-60 px-1">背景色を選択（右クリック）</p>
                            <div className="flex flex-wrap gap-1 max-w-[180px]">
                                {CELL_COLORS.map((color, ci) => (
                                    <button key={ci} title={CELL_COLOR_LABELS[ci]}
                                        onMouseDown={e=>{ e.preventDefault(); const updated={...cellColors}; if(!color) delete updated[colorPicker.key]; else updated[colorPicker.key]=color; setCellColors(updated); setColorPicker(null); }}
                                        className={`w-7 h-7 rounded-lg border-2 transition-transform hover:scale-110 ${!color?'border-slate-300 dark:border-slate-600':cellColors[colorPicker.key]===color?'border-slate-700 dark:border-white scale-110':'border-transparent'}`}
                                        style={{backgroundColor: color || 'transparent'}}
                                    >{!color && <i className="fa-solid fa-xmark text-slate-400 text-[10px]"></i>}</button>
                                ))}
                            </div>
                        </div>,
                        document.body
                    )}

                    {/* オートコンプリート ドロップダウン (portal) */}
                    {acTarget !== null && (() => {
                        const q = acQuery.trim();
                        const suggestions = BA_CHARACTERS.filter(c => q === '' ? true : c.includes(q));
                        if (suggestions.length === 0) return null;
                        return ReactDOM.createPortal(
                            <div
                                ref={acListRef}
                                data-ac-zone="true"
                                style={{position:'fixed', top: acPos.top, left: acPos.left, width: Math.max(acPos.width, 160), zIndex: 9999, scrollbarWidth:'thin', maxHeight:'12rem', overflowY:'auto'}}
                                className={`rounded-xl border shadow-2xl text-xs ${theme==='arona'?'bg-white border-sky-200':'bg-[#1e1b2e] border-purple-700'}`}
                            >
                                {suggestions.map((c, si) => (
                                    <div key={c}
                                        id={`ac-item-${si}`}
                                        onMouseDown={e => { e.preventDefault(); const updated=[...formationSlots]; updated[acTarget]={...updated[acTarget],name:c}; setFormationSlots(updated); setAcTarget(null); }}
                                        onMouseEnter={() => setAcHighlight(si)}
                                        className={`px-3 py-1.5 cursor-pointer transition-colors ${si === acHighlight ? (theme==='arona' ? 'bg-sky-100 text-sky-800' : 'bg-purple-800/60 text-white') : (theme==='arona'?'hover:bg-sky-50':'hover:bg-purple-900/40')}`}
                                    >{c}</div>
                                ))}
                            </div>,
                            document.body
                        );
                    })()}
                    {showImportModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className={`w-full max-w-md rounded-2xl border shadow-2xl p-6 flex flex-col gap-4 ${theme==='arona'?'bg-white border-sky-100':'bg-[#1e1b2e] border-purple-900/50'}`}>
                                <h2 className="font-bold text-sm flex items-center gap-2"><i className="fa-solid fa-file-import text-indigo-500"></i>履歴データのインポート</h2>
                                <p className="text-xs opacity-60">同タイトルの履歴は上書き、新規タイトルは追加されます。</p>
                                <div
                                    className={`border-2 border-dashed rounded-xl flex flex-col items-center justify-center gap-3 py-10 px-6 cursor-pointer transition-colors select-none
                                        ${importDragOver
                                            ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/30'
                                            : 'border-slate-300 dark:border-purple-800 hover:border-indigo-400 dark:hover:border-indigo-600 hover:bg-slate-50 dark:hover:bg-purple-950/20'
                                        }`}
                                    onDragOver={e=>{e.preventDefault();setImportDragOver(true);}}
                                    onDragLeave={()=>setImportDragOver(false)}
                                    onDrop={e=>{e.preventDefault();setImportDragOver(false);handleImportFile(e.dataTransfer.files[0]);}}
                                    onClick={()=>document.getElementById('import-file-input').click()}
                                >
                                    <i className={`fa-solid fa-cloud-arrow-up text-4xl ${importDragOver ? 'text-indigo-500' : 'text-slate-400 dark:text-purple-700'}`}></i>
                                    <div className="text-center">
                                        <p className="text-sm font-bold opacity-80">JSONファイルをドロップ</p>
                                        <p className="text-xs opacity-50 mt-1">またはクリックしてファイルを選択</p>
                                    </div>
                                    <input id="import-file-input" type="file" accept=".json" className="hidden" onChange={e=>handleImportFile(e.target.files[0])} />
                                </div>
                                <div className="flex justify-end">
                                    <button onClick={()=>setShowImportModal(false)} className="px-4 py-2 rounded-xl text-xs border dark:border-purple-900 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">キャンセル</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
