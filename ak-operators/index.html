.clickable-cell, 
td {
    /* セル内でバッジが縦・横に自然に折り返して並ぶようにする設定 */
    vertical-align: middle;
}

/* 各バッジ（チップ）の共通基本デザイン */
.badge {
    display: inline-block;
    padding: 4px 8px;
    margin: 2px 3px;
    font-size: 0.82em;
    font-weight: 500;
    border-radius: 4px;
    border: 1px solid transparent;
    white-space: nowrap; /* バッジの途中で文字が改行されるのを防ぐ */
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
}

/* マウスホバー時に少し浮き上がらせる演出 */
.badge:hover {
    transform: translateY(-1px);
    box-shadow: 0 3px 5px rgba(0, 0, 0, 0.15);
    filter: brightness(0.95);
}

/* 🌟 各列ごとの色分け設定（テーマに合わせてお好みで変更してください） */

/* ① 入手方法のバッジ色（例：落ち着いたブルーグレー系） */
.badge-obtain {
    background-color: #e9ecef;
    color: #495057;
    border-color: #ced4da;
}
/* ダークテーマ用（もしあれば） */
[data-theme="dark"] .badge-obtain,
.theme-dark .badge-obtain {
    background-color: #343a40;
    color: #f8f9fa;
    border-color: #495057;
}

/* ② 募集タグのバッジ色（例：柔らかなグリーン系） */
.badge-recruitTags {
    background-color: #e8f5e9;
    color: #2e7d32;
    border-color: #c8e6c9;
}
[data-theme="dark"] .badge-recruitTags,
.theme-dark .badge-recruitTags {
    background-color: #1b5e20;
    color: #e8f5e9;
    border-color: #2e7d32;
}

/* ③ スキルタグのバッジ色（例：鮮やかなアクア・ブルー系） */
.badge-sTag {
    background-color: #e3f2fd;
    color: #1565c0;
    border-color: #bbdefb;
}
[data-theme="dark"] .badge-sTag,
.theme-dark .badge-sTag {
    background-color: #0d47a1;
    color: #e3f2fd;
    border-color: #1565c0;
}

/* 🌟 バッジ内で検索キーワードがヒットした時の強調表示調整 */
.badge mark.highlight {
    background-color: #ffeb3b; /* 鮮やかな黄色 */
    color: #000000;
    padding: 0 2px;
    border-radius: 2px;
    font-weight: bold;
}

            <div class="search-footer-row" style="display:flex; justify-content: flex-end; margin-top:8px;">

        <button class="btn-add-tab" onclick="addTab()">＋</button>
        
        <div class="layout-controls">
            <button class="layout-btn" id="layout-single" onclick="changeLayout('single')">▢ 通常</button>

        </div>
    </div>

    <div class="workspace-container" id="workspace">
        <div class="table-view-wrapper" id="leftView" onclick="setActiveSide('left')">

                    <thead id="leftHead"></thead>
                    <tbody id="leftBody"></tbody>
                </table>
            </div>
        </div>
        <div class="table-view-wrapper" id="rightView" style="display:none;" onclick="setActiveSide('right')">

                </table>
            </div>

    <div id="columnModal" class="modal">

            <div id="columnListContainer" style="max-height:400px; overflow-y:auto; margin-bottom:20px;"></div>

                <button onclick="closeModal('columnModal')" class="btn-action">キャンセル</button>
                <button onclick="saveColumnSettings()" class="btn-action" style="background:#2196f3; color:white; margin-left:10px;">保存</button>
            </div>
